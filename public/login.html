<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TULU - Iniciar Sesion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--p:#7C3AED;--pl:#A78BFA;--pd:#5B21B6;--acc:#F43F5E;--bg:#08080F;--bg2:#0F0F1C;--bg3:#171730;--bg4:#222244;--tx:#fff;--tx2:#C4C4D8;--tx3:#7777A0;--brd:rgba(255,255,255,.06);--r:14px;--rs:8px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--tx);display:flex;align-items:center;justify-content:center;padding:20px}
        .auth-container{width:100%;max-width:420px}
        .auth-logo{text-align:center;margin-bottom:32px}
        .auth-logo i{font-size:2.5rem;background:linear-gradient(135deg,var(--p),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .auth-logo h1{font-size:1.8rem;letter-spacing:3px;background:linear-gradient(135deg,var(--p),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .auth-logo p{color:var(--tx3);font-size:.82rem;margin-top:4px}
        .auth-card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--bg3);border-radius:var(--rs);padding:4px}
        .auth-tab{flex:1;padding:10px;background:none;color:var(--tx3);font-size:.82rem;font-weight:600;border-radius:6px;text-align:center;cursor:pointer;transition:all .3s}
        .auth-tab.active{background:var(--p);color:#fff}
        .auth-form{display:none}
        .auth-form.active{display:block}
        .field{margin-bottom:16px}
        .field label{display:block;font-size:.72rem;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
        .field input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:.88rem;font-family:inherit;outline:none;transition:border .3s}
        .field input:focus{border-color:var(--p)}
        .field input::placeholder{color:var(--tx3)}
        .btn-auth{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--acc));color:#fff;border:none;border-radius:50px;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s;margin-top:8px}
        .btn-auth:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.4)}
        .btn-auth:disabled{opacity:.5;pointer-events:none}
        .error-msg{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:var(--rs);padding:10px 14px;color:var(--acc);font-size:.78rem;margin-bottom:16px;display:none}
        .error-msg.show{display:block}
        .success-msg{background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);border-radius:var(--rs);padding:10px 14px;color:#16A34A;font-size:.78rem;margin-bottom:16px;display:none}
        .success-msg.show{display:block}
        .skip-link{text-align:center;margin-top:20px}
        .skip-link a{color:var(--tx3);font-size:.78rem;text-decoration:none;transition:color .3s}
        .skip-link a:hover{color:var(--pl)}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-tshirt"></i>
            <h1>TULU</h1>
            <p>3D Fashion Studio</p>
        </div>
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Iniciar Sesion</button>
                <button class="auth-tab" data-tab="register">Registrarse</button>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input type="password" id="loginPass" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="btn-auth"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm">
                <div class="field">
                    <label>Nombre completo</label>
                    <input type="text" id="regName" placeholder="Tu nombre" required>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="tu@email.com" required>
                </div>
                <div class="field">
                    <label>Telefono (opcional)</label>
                    <input type="tel" id="regPhone" placeholder="+57 300 123 4567">
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input type="password" id="regPass" placeholder="Minimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn-auth"><i class="fas fa-user-plus"></i> Crear Cuenta</button>
            </form>
        </div>
        <div class="skip-link">
            <a href="index.html"><i class="fas fa-arrow-right"></i> Explorar sin cuenta</a>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        // Check if already logged in
        const token = localStorage.getItem('tulu_token');
        if (token) {
            const user = JSON.parse(localStorage.getItem('tulu_user') || '{}');
            if (user.role === 'admin') window.location.href = '/admin.html';
            else window.location.href = '/index.html';
        }

        // Tabs
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
                hideMessages();
            });
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg; el.classList.add('show');
            document.getElementById('successMsg').classList.remove('show');
        }
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg; el.classList.add('show');
            document.getElementById('errorMsg').classList.remove('show');
        }
        function hideMessages() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            try {
                const res = await fetch(API + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPass').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                localStorage.setItem('tulu_token', data.token);
                localStorage.setItem('tulu_user', JSON.stringify(data.user));
                if (data.user.role === 'admin') window.location.href = '/admin.html';
                else window.location.href = '/index.html';
            } catch (err) {
                showError(err.message);
            }
            btn.disabled = false;
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            try {
                const res = await fetch(API + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value,
                        email: document.getElementById('regEmail').value,
                        phone: document.getElementById('regPhone').value,
                        password: document.getElementById('regPass').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                localStorage.setItem('tulu_token', data.token);
                localStorage.setItem('tulu_user', JSON.stringify(data.user));
                window.location.href = '/index.html';
            } catch (err) {
                showError(err.message);
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
